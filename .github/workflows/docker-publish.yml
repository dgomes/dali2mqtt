name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Tag to build (e.g. v0.0.4)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Capture short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Set build metadata
        run: |
          VERSION="$GITHUB_REF_NAME"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION="$SHORT_SHA"
          fi
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          VCS_REF="$SHORT_SHA"
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          BRANCH_SLUG=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "VCS_REF=$VCS_REF" >> "$GITHUB_ENV"
          echo "TIMESTAMP=$TIMESTAMP" >> "$GITHUB_ENV"
          echo "BRANCH_SLUG=$BRANCH_SLUG" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.ref || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.ref || github.ref_name }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev-${{ env.BRANCH_SLUG }}-${{ env.TIMESTAMP }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            VCS_REF=${{ env.SHORT_SHA }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            SOURCE_URL=https://github.com/${{ github.repository }}
